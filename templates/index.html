/* ═══════════════════════════════════════════════════
   PAGE: DASHBOARD
═══════════════════════════════════════════════════ */
function Dashboard(){
  const {visibleWarehouses,visibleProducts,moves,lowStock,outOfStock,authUser,toast,setProducts,warehouses}=useApp();
  const [showAddWH,setShowAddWH]=useState(false);
  const [whForm,setWhForm]=useState({code:'',name:'',address:'',location:''});
  const [whErrors,setWhErrors]=useState({});

  const totalValue=visibleProducts.reduce((s,p)=>s+p.qty*p.cost,0);
  const totalSkus=visibleProducts.length;
  const recentMoves=moves.slice(0,5);

  /* Mini chart — last 7 days movement count */
  const chartDays=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const chartVals=[12,18,9,24,14,8,20];
  const maxV=Math.max(...chartVals);

  const validateWH=()=>{
    const e={};
    if(!whForm.code.trim())e.code='Required';
    if(!whForm.name.trim())e.name='Required';
    if(!whForm.address.trim())e.address='Required';
    return e;
  };

  const addWarehouse=async ()=>{
    const e=validateWH();
    if(Object.keys(e).length){setWhErrors(e);return;}
    try {
      const res = await fetch('/warehouses', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: whForm.name, location: whForm.location })
      });
      if(res.ok) {
        toast(`Warehouse ${whForm.name} added!`);
        setTimeout(() => window.location.reload(), 800);
      }
    } catch(err) { toast('Error adding warehouse', 'error') }
    setShowAddWH(false);setWhForm({code:'',name:'',address:'',location:''});setWhErrors({});
  };

  return <div className="page mod-dashboard">
    <div className="pg-hdr">
      <div>
        <div className="pg-title">Dashboard</div>
        <div className="pg-sub">
          {authUser?.role==='Admin'?`All warehouses · ${visibleWarehouses.length} locations`:`Viewing: ${warehouses.find(w=>w.id===authUser?.warehouse)?.name}`}
        </div>
      </div>
      <div className="pg-actions">
        {authUser?.role==='Admin'&&<button className="btn btn-primary" onClick={()=>setShowAddWH(true)}>+ Add Warehouse</button>}
      </div>
    </div>

    {/* ── STAT ROW ── */}
    <div className="stats-grid">
      <div className="stat">
        <div className="s-label">Warehouses</div>
        <div className="s-val">{visibleWarehouses.length}</div>
        <div className="s-sub">Active locations</div>
      </div>
      <div className="stat">
        <div className="s-label">Total SKUs</div>
        <div className="s-val">{totalSkus}</div>
        <div className="s-tag s-tag-g">{visibleProducts.filter(p=>p.status==='active').length} active</div>
      </div>
      <div className="stat">
        <div className="s-label">Inventory Value</div>
        <div className="s-val" style={{fontSize:17}}>{fmtRupee(totalValue)}</div>
        <div className="s-sub s-up">↑ 4.2% this week</div>
      </div>
      <div className="stat">
        <div className="s-label">Alerts</div>
        <div className="s-val" style={{color:lowStock.length+outOfStock.length>0?'var(--red)':'var(--text)'}}>{lowStock.length+outOfStock.length}</div>
        <div className="s-sub">{outOfStock.length} out-of-stock · {lowStock.length} low</div>
        {outOfStock.length>0&&<div className="s-tag s-tag-r">Action needed</div>}
      </div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:22}}>
      {/* ── CHART ── */}
      <div className="card">
        <div className="card-hdr"><span className="card-title">Weekly Movement</span></div>
        <div className="card-body">
          <div className="chart-wrap">
            {chartVals.map((v,i)=><div key={i} className="ch-col">
              <div className="ch-bar" style={{height:`${Math.round(v/maxV*88)}px`}}/>
              <div className="ch-lbl">{chartDays[i]}</div>
            </div>)}
          </div>
        </div>
      </div>
      {/* ── RECENT MOVES ── */}
      <div className="card">
        <div className="card-hdr"><span className="card-title">Recent Movements</span></div>
        <div className="tw">
          <table>
            <thead><tr><th>Product</th><th>Type</th><th>Qty</th><th>Date</th></tr></thead>
            <tbody>
              {recentMoves.map(m=><tr key={m.id}>
                <td style={{fontSize:12,fontWeight:500}}>{m.productName}</td>
                <td><span className={`pill ${m.type==='receipt'?'pill-g':m.type==='delivery'?'pill-b':m.type==='transfer'?'pill-p':'pill-a'}`} style={{fontSize:10}}>{m.type}</span></td>
                <td><span style={{fontFamily:'var(--mono)',fontWeight:700,color:m.qty>0?'var(--green)':'var(--red)',fontSize:12}}>{m.qty>0?'+':''}{m.qty}</span></td>
                <td style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>{fmtDate(m.date)}</td>
              </tr>)}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    {/* ── WAREHOUSE GRID ── */}
    <div style={{marginBottom:8,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span style={{fontSize:12,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.6px'}}>Warehouses</span>
    </div>
    <div className="wh-grid">
      {visibleWarehouses.map(wh=>{
        const whProds=visibleProducts.filter(p=>p.warehouse===wh.id);
        const whValue=whProds.reduce((s,p)=>s+p.qty*p.cost,0);
        return <div key={wh.id} className="wh-card">
          <div className="wh-code">{wh.code}</div>
          <div className="wh-name">{wh.name}</div>
          <div className="wh-addr">{wh.address}</div>
          <div className="wh-meta">
            <div className="wh-meta-item">SKUs<div className="wh-meta-val">{whProds.length}</div></div>
            <div className="wh-meta-item">Value<div className="wh-meta-val">{fmtRupee(whValue)}</div></div>
            <div className="wh-meta-item">Location<div className="wh-meta-val">{wh.location}</div></div>
          </div>
        </div>;
      })}
    </div>

    {/* ── ADD WAREHOUSE MODAL ── */}
    {showAddWH&&<Modal title="Add Warehouse" onClose={()=>{setShowAddWH(false);setWhErrors({})}}
      footer={<>
        <button className="btn btn-ghost" onClick={()=>{setShowAddWH(false);setWhErrors({})}}>Cancel</button>
        <button className="btn btn-primary" onClick={addWarehouse}>Save Warehouse</button>
      </>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="Warehouse Code" required error={whErrors.code}>
          <input value={whForm.code} onChange={e=>setWhForm(f=>({...f,code:e.target.value}))} placeholder="WH04" className={whErrors.code?'invalid':''}/>
        </Field>
        <Field label="Location" required>
          <input value={whForm.location} onChange={e=>setWhForm(f=>({...f,location:e.target.value}))} placeholder="City name"/>
        </Field>
      </div>
      <Field label="Warehouse Name" required error={whErrors.name}>
        <input value={whForm.name} onChange={e=>setWhForm(f=>({...f,name:e.target.value}))} placeholder="e.g. East Distribution Hub" className={whErrors.name?'invalid':''}/>
      </Field>
      <Field label="Address" required error={whErrors.address}>
        <textarea rows={2} value={whForm.address} onChange={e=>setWhForm(f=>({...f,address:e.target.value}))} placeholder="Full address…" className={whErrors.address?'invalid':''}/>
      </Field>
    </Modal>}
  </div>;
}

/* ═══════════════════════════════════════════════════
   PAGE: OPERATION
═══════════════════════════════════════════════════ */
function Operation(){
  const {visibleReceipts,visibleDeliveries,setReceipts,setDeliveries,toast,authUser,warehouses,vendors,customers,products,genReceiptRef,addMove}=useApp();
  const [tab,setTab]=useState('receipts');
  const [search,setSearch]=useState('');
  const [statusF,setStatusF]=useState('');
  const [showAddR,setShowAddR]=useState(false);
  const [billDoc,setBillDoc]=useState(null);
  const [billType,setBillType]=useState(null);

  /* Add Receipt Form state */
  const initForm={warehouse:authUser?.warehouse||'WH01',vendor:'v1',scheduleDate:'',items:[{productId:'p1',qty:1}],status:'pending'};
  const [rForm,setRForm]=useState(initForm);
  const [rErrors,setRErrors]=useState({});

  const filteredR=visibleReceipts.filter(r=>{
    if(search&&!r.ref.toLowerCase().includes(search.toLowerCase()))return false;
    if(statusF&&r.status!==statusF)return false;
    return true;
  });
  const filteredD=visibleDeliveries.filter(d=>{
    if(search&&!d.ref.toLowerCase().includes(search.toLowerCase()))return false;
    if(statusF&&d.status!==statusF)return false;
    return true;
  });

  const validateR=()=>{
    const e={};
    if(!rForm.vendor)e.vendor='Required';
    if(!rForm.scheduleDate)e.scheduleDate='Required';
    if(rForm.items.some(i=>!i.productId||!i.qty||Number(i.qty)<1))e.items='All items need product and quantity ≥ 1';
    return e;
  };

  const saveReceipt=async ()=>{
    const e=validateR();
    if(Object.keys(e).length){setRErrors(e);return;}
    try {
      const res = await fetch('/operations/receipt/create', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
           vendor_id: parseInt(rForm.vendor),
           warehouse_id: parseInt(rForm.warehouse),
           items: rForm.items.map(i => ({ product_id: parseInt(i.productId.split('_')[0]), qty: Number(i.qty) }))
        })
      });
      if(res.ok) {
         const d = await res.json();
         if(rForm.status === 'done') {
            await fetch(`/operations/receipt/validate/${d.receipt_id}`, { method: 'POST' });
         }
         toast(`Receipt created!`);
         setTimeout(() => window.location.reload(), 800);
      } else {
         toast('Failed to save receipt', 'error');
      }
    } catch(err) { toast('Failed to save receipt', 'error'); }
    setShowAddR(false);setRForm(initForm);setRErrors({});
  };

  return <div className="page mod-operation">
    <div className="pg-hdr">
      <div><div className="pg-title">Operations</div><div className="pg-sub">Receipts, Deliveries & Location Management</div></div>
      <div className="pg-actions">
        <button className="btn btn-primary" onClick={()=>setShowAddR(true)}>+ New Receipt</button>
      </div>
    </div>

    <div className="page-tabs">
      {['receipts','deliveries','locations'].map(t=><div key={t} className={`page-tab${tab===t?' on':''}`} onClick={()=>setTab(t)} style={{textTransform:'capitalize'}}>{t==='receipts'?`📥 Receipts (${visibleReceipts.length})`:t==='deliveries'?`📤 Deliveries (${visibleDeliveries.length})`:'📍 Locations'}</div>)}
    </div>

    {tab!=='locations'&&<div className="frow">
      <SInput value={search} onChange={setSearch} placeholder="Search by reference…" style={{maxWidth:260}}/>
      <select style={{maxWidth:160,fontSize:12,height:30,padding:'0 9px',borderRadius:20}} value={statusF} onChange={e=>setStatusF(e.target.value)}>
        <option value="">All Statuses</option>
        <option value="done">Done</option>
        <option value="pending">Pending</option>
        <option value="draft">Draft</option>
        <option value="shipped">Shipped</option>
        <option value="cancelled">Cancelled</option>
      </select>
      {(search||statusF)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setSearch('');setStatusF('');}}>✕ Clear</button>}
    </div>}

    {/* ── RECEIPTS TABLE ── */}
    {tab==='receipts'&&<div className="card">
      <div className="tw"><table>
        <thead><tr><th>Reference ID</th><th>Vendor</th><th>Warehouse</th><th>Schedule Date</th><th>Status</th><th>Total</th><th>Actions</th></tr></thead>
        <tbody>
          {filteredR.length===0&&<tr><td colSpan={7}><Empty icon="📥" title="No receipts found" sub="Create a new receipt with the button above"/></td></tr>}
          {filteredR.map(r=>{
            const vnd=vendors.find(v=>v.id===r.vendor);
            const wh=warehouses.find(w=>w.id===r.warehouse);
            return <tr key={r.id}>
              <td><code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:600}}>{r.ref}</code></td>
              <td style={{fontSize:12,fontWeight:500}}>{vnd?.name||'—'}</td>
              <td><span className="pill pill-b" style={{fontSize:10}}>{wh?.code}</span></td>
              <td style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{r.scheduleDate?fmtDate(r.scheduleDate):'—'}</td>
              <td><SBadge status={r.status}/></td>
              <td style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:12}}>{fmtRupee(r.total)}</td>
              <td>
                <button className="btn btn-ghost btn-xs" onClick={()=>{setBillDoc(r);setBillType('receipt')}}>🧾 Bill</button>
              </td>
            </tr>;
          })}
        </tbody>
      </table></div>
    </div>}

    {/* ── DELIVERIES TABLE ── */}
    {tab==='deliveries'&&<div className="card">
      <div className="tw"><table>
        <thead><tr><th>Reference ID</th><th>Customer</th><th>Warehouse</th><th>Schedule Date</th><th>Status</th><th>Total</th><th>Actions</th></tr></thead>
        <tbody>
          {filteredD.length===0&&<tr><td colSpan={7}><Empty icon="📤" title="No deliveries found"/></td></tr>}
          {filteredD.map(d=>{
            const cust=customers.find(c=>c.id===d.customer);
            const wh=warehouses.find(w=>w.id===d.warehouse);
            return <tr key={d.id}>
              <td><code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:600}}>{d.ref}</code></td>
              <td style={{fontSize:12,fontWeight:500}}>{cust?.name||'—'}</td>
              <td><span className="pill pill-b" style={{fontSize:10}}>{wh?.code}</span></td>
              <td style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{d.scheduleDate?fmtDate(d.scheduleDate):'—'}</td>
              <td><SBadge status={d.status}/></td>
              <td style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:12}}>{fmtRupee(d.total)}</td>
              <td><button className="btn btn-ghost btn-xs" onClick={()=>{setBillDoc(d);setBillType('delivery')}}>🧾 Bill</button></td>
            </tr>;
          })}
        </tbody>
      </table></div>
    </div>}

    {/* ── LOCATIONS ── */}
    {tab==='locations'&&<div className="wh-grid">
      {warehouses.map(wh=><div key={wh.id} className="wh-card">
        <div className="wh-code">{wh.code}</div>
        <div className="wh-name">{wh.name}</div>
        <div className="wh-addr">{wh.address}</div>
        <div style={{marginTop:10}}>
          <span className="pill pill-b" style={{fontSize:10}}>📍 {wh.location}</span>
        </div>
      </div>)}
    </div>}

    {/* ── ADD RECEIPT MODAL ── */}
    {showAddR&&<Modal title="New Receipt" onClose={()=>{setShowAddR(false);setRErrors({})}} wide
      footer={<>
        <button className="btn btn-ghost" onClick={()=>{setShowAddR(false);setRErrors({})}}>Cancel</button>
        <button className="btn btn-primary" onClick={saveReceipt}>Create Receipt</button>
      </>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
        <Field label="Warehouse" required>
          <select value={rForm.warehouse} onChange={e=>setRForm(f=>({...f,warehouse:e.target.value}))} disabled={authUser?.role!=='Admin'}>
            {warehouses.map(w=><option key={w.id} value={w.id}>{w.code} — {w.name}</option>)}
          </select>
        </Field>
        <Field label="Vendor" required error={rErrors.vendor}>
          <select value={rForm.vendor} onChange={e=>setRForm(f=>({...f,vendor:e.target.value}))} className={rErrors.vendor?'invalid':''}>
            {vendors.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
          </select>
        </Field>
        <Field label="Schedule Date" required error={rErrors.scheduleDate}>
          <input type="date" value={rForm.scheduleDate} onChange={e=>setRForm(f=>({...f,scheduleDate:e.target.value}))} className={rErrors.scheduleDate?'invalid':''}/>
        </Field>
        <Field label="Status">
          <select value={rForm.status} onChange={e=>setRForm(f=>({...f,status:e.target.value}))}>
            <option value="pending">Pending</option>
            <option value="done">Done</option>
            <option value="draft">Draft</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </Field>
      </div>
      <div className="div"/>
      <div style={{marginBottom:8,fontSize:12,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Items</div>
      {rErrors.items&&<div className="field-error" style={{marginBottom:8}}>⚠ {rErrors.items}</div>}
      {rForm.items.map((item,i)=><div key={i} style={{display:'flex',gap:8,alignItems:'flex-end',marginBottom:8}}>
        <div style={{flex:2}}>
          {i===0&&<label className="fl" style={{marginBottom:5}}>Product</label>}
          <select value={item.productId} onChange={e=>{const it=[...rForm.items];it[i]={...it[i],productId:e.target.value};setRForm(f=>({...f,items:it}))}}>
            {products.map(p=><option key={p.id} value={p.id}>{p.name} ({p.sku})</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          {i===0&&<label className="fl" style={{marginBottom:5}}>Qty</label>}
          <input type="number" min={1} value={item.qty} onChange={e=>{const it=[...rForm.items];it[i]={...it[i],qty:e.target.value};setRForm(f=>({...f,items:it}))}}/>
        </div>
        {rForm.items.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>setRForm(f=>({...f,items:f.items.filter((_,j)=>j!==i)}))}>✕</button>}
      </div>)}
      <button className="btn btn-secondary btn-sm" style={{marginTop:4}} onClick={()=>setRForm(f=>({...f,items:[...f.items,{productId:'p1',qty:1}]}))}>+ Add Item</button>
      <div className="div"/>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{fontSize:11,color:'var(--text3)'}}>Auto-generated Reference ID:</div>
        <div className="receipt-id-box">{warehouses.find(w=>w.id===rForm.warehouse)?.code||'WH'}/OP/XXX</div>
      </div>
    </Modal>}

    {billDoc&&<BillModal doc={billDoc} type={billType} onClose={()=>setBillDoc(null)}/>}
  </div>;
}

/* ═══════════════════════════════════════════════════
   PAGE: STOCK
═══════════════════════════════════════════════════ */
function Stock(){
  const {visibleProducts,setProducts,addMove,toast,authUser,categories,units,warehouses}=useApp();
  const [search,setSearch]=useState('');
  const [catF,setCatF]=useState('');
  const [whF,setWhF]=useState('');
  const [statusF,setStatusF]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [adjModal,setAdjModal]=useState(null);
  const [adjType,setAdjType]=useState('in');
  const [adjQty,setAdjQty]=useState('');

  /* Add Product form */
  const initProd={sku:'',name:'',category:'cat1',unit:'u1',warehouse:authUser?.warehouse||'WH01',minQty:10,reorderQty:50,cost:0,price:0,status:'active'};
  const [pForm,setPForm]=useState(initProd);
  const [pErrors,setPErrors]=useState({});

  const filtered=visibleProducts.filter(p=>{
    if(search&&!p.name.toLowerCase().includes(search.toLowerCase())&&!p.sku.toLowerCase().includes(search.toLowerCase()))return false;
    if(catF&&p.category!==catF)return false;
    if(whF&&p.warehouse!==whF)return false;
    if(statusF&&p.status!==statusF)return false;
    return true;
  });

  const validateP=()=>{
    const e={};
    if(!pForm.sku.trim())e.sku='Required';
    if(!pForm.name.trim())e.name='Required';
    if(Number(pForm.cost)<0)e.cost='Must be ≥ 0';
    return e;
  };

  const saveProduct=async ()=>{
    const e=validateP();
    if(Object.keys(e).length){setPErrors(e);return;}
    try {
      const res = await fetch('/products', {
         method: 'POST', headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify({
            name: pForm.name,
            sku: pForm.sku,
            category_id: parseInt(pForm.category) || 1,
            unit_id: parseInt(pForm.unit) || 1,
            cost_price: Number(pForm.cost),
            selling_price: Number(pForm.price),
            reorder_level: Number(pForm.minQty)
         })
      });
      if(res.ok) {
         toast(`Product ${pForm.name} added!`);
         setTimeout(() => window.location.reload(), 800);
      } else {
         toast('Failed to add product (duplicate SKU?)', 'error');
      }
    } catch(err) { toast('Error saving product', 'error'); }
    setShowAdd(false);setPForm(initProd);setPErrors({});
  };

  const doAdj=async ()=>{
    if(!adjQty||Number(adjQty)<1)return;
    const delta=adjType==='in'?Number(adjQty):-Number(adjQty);
    try {
      const res = await fetch('/inventory/adjust', {
         method: 'POST', headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify({
            product_id: parseInt(adjModal.id),
            warehouse_id: parseInt(adjModal.warehouse) || 1,
            qty: delta,
            reference: `ADJ-${genId()}`
         })
      });
      if(res.ok) {
         toast(`${adjType==='in'?'Stocked in':'Removed'} ${adjQty} units of ${adjModal.name}`);
         setTimeout(() => window.location.reload(), 800);
      }
    } catch(err) {}
    setAdjModal(null);setAdjQty('');
  };

  const stockStatus=(p)=>{
    if(p.qty===0)return{cls:'pill-r',label:'Out of Stock'};
    if(p.qty<=p.minQty)return{cls:'pill-rose',label:'Low Stock'};
    return{cls:'pill-g',label:'In Stock'};
  };

  return <div className="page mod-stock">
    <div className="pg-hdr">
      <div><div className="pg-title">Stock</div><div className="pg-sub">High-density inventory view · {filtered.length} products</div></div>
      <div className="pg-actions">
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add Product</button>
      </div>
    </div>

    <div className="frow">
      <SInput value={search} onChange={setSearch} placeholder="Search product or SKU…" style={{maxWidth:260}}/>
      <select style={{maxWidth:160,fontSize:12,height:30,padding:'0 9px',borderRadius:20}} value={catF} onChange={e=>setCatF(e.target.value)}>
        <option value="">All Categories</option>
        {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
      {authUser?.role==='Admin'&&<select style={{maxWidth:180,fontSize:12,height:30,padding:'0 9px',borderRadius:20}} value={whF} onChange={e=>setWhF(e.target.value)}>
        <option value="">All Warehouses</option>
        {warehouses.map(w=><option key={w.id} value={w.id}>{w.code} — {w.name}</option>)}
      </select>}
      <select style={{maxWidth:130,fontSize:12,height:30,padding:'0 9px',borderRadius:20}} value={statusF} onChange={e=>setStatusF(e.target.value)}>
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
      {(search||catF||whF||statusF)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setSearch('');setCatF('');setWhF('');setStatusF('');}}>✕ Clear</button>}
    </div>

    <div className="card">
      <div className="tw"><table>
        <thead><tr>
          <th>SKU</th><th>Product</th><th>Category</th><th>Warehouse</th>
          <th style={{textAlign:'right'}}>Cost</th>
          <th style={{textAlign:'right'}}>On Hand</th>
          <th style={{textAlign:'right'}}>Available</th>
          <th>Stock</th><th>Actions</th>
        </tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={9}><Empty icon="◫" title="No products found" sub="Adjust filters or add a product"/></td></tr>}
          {filtered.map(p=>{
            const cat=categories.find(c=>c.id===p.category);
            const wh=warehouses.find(w=>w.id===p.warehouse);
            const st=stockStatus(p);
            return <tr key={p.id}>
              <td><code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:600}}>{p.sku}</code></td>
              <td>
                <div style={{fontWeight:600,fontSize:12}}>{p.name}</div>
                {p.status==='inactive'&&<span className="pill pill-x" style={{fontSize:9,marginTop:2}}>Inactive</span>}
              </td>
              <td style={{fontSize:12,color:'var(--text2)'}}>{cat?.name||'—'}</td>
              <td><span className="pill pill-b" style={{fontSize:10}}>{wh?.code||'—'}</span></td>
              <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,fontWeight:600}}>{fmtRupee(p.cost)}</td>
              <td style={{textAlign:'right',fontFamily:'var(--mono)',fontWeight:700,fontSize:14,color:p.qty===0?'var(--red)':p.qty<=p.minQty?'var(--amber)':'var(--text)'}}>{p.qty}</td>
              <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)'}}>{Math.max(0,p.qty)}</td>
              <td>
                <span className={`pill ${st.cls}`} style={{fontSize:10}}>{st.label}</span>
                <StockBar qty={p.qty} minQty={p.minQty}/>
              </td>
              <td>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn btn-success btn-xs" onClick={()=>{setAdjModal({...p, id: p.real_id || p.id});setAdjType('in');setAdjQty('');}}>↑ In</button>
                  <button className="btn btn-danger btn-xs" onClick={()=>{setAdjModal({...p, id: p.real_id || p.id});setAdjType('out');setAdjQty('');}}>↓ Out</button>
                </div>
              </td>
            </tr>;
          })}
        </tbody>
      </table></div>
    </div>

    {/* ── ADD PRODUCT MODAL ── */}
    {showAdd&&<Modal title="Add Product" onClose={()=>{setShowAdd(false);setPErrors({})}} wide
      footer={<>
        <button className="btn btn-ghost" onClick={()=>{setShowAdd(false);setPErrors({})}}>Cancel</button>
        <button className="btn btn-primary" onClick={saveProduct}>Save Product</button>
      </>}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Field label="SKU" required error={pErrors.sku}>
          <input value={pForm.sku} onChange={e=>setPForm(f=>({...f,sku:e.target.value}))} placeholder="SKU-009" className={pErrors.sku?'invalid':''}/>
        </Field>
        <Field label="Category">
          <select value={pForm.category} onChange={e=>setPForm(f=>({...f,category:e.target.value}))}>
            {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </Field>
        <Field label="Product Name" required error={pErrors.name}>
          <input value={pForm.name} onChange={e=>setPForm(f=>({...f,name:e.target.value}))} placeholder="Product name" className={pErrors.name?'invalid':''} style={{gridColumn:'span 2'}}/>
        </Field>
        <Field label="Unit">
          <select value={pForm.unit} onChange={e=>setPForm(f=>({...f,unit:e.target.value}))}>
            {units.map(u=><option key={u.id} value={u.id}>{u.name} ({u.abbr})</option>)}
          </select>
        </Field>
        <Field label="Warehouse">
          <select value={pForm.warehouse} onChange={e=>setPForm(f=>({...f,warehouse:e.target.value}))} disabled={authUser?.role!=='Admin'}>
            {warehouses.map(w=><option key={w.id} value={w.id}>{w.code} — {w.name}</option>)}
          </select>
        </Field>
        <Field label="Cost Price (₹)" error={pErrors.cost}>
          <input type="number" min={0} value={pForm.cost} onChange={e=>setPForm(f=>({...f,cost:e.target.value}))} className={pErrors.cost?'invalid':''}/>
        </Field>
        <Field label="Selling Price (₹)">
          <input type="number" min={0} value={pForm.price} onChange={e=>setPForm(f=>({...f,price:e.target.value}))}/>
        </Field>
        <Field label="Min Qty (reorder point)">
          <input type="number" min={0} value={pForm.minQty} onChange={e=>setPForm(f=>({...f,minQty:e.target.value}))}/>
        </Field>
        <Field label="Reorder Qty">
          <input type="number" min={0} value={pForm.reorderQty} onChange={e=>setPForm(f=>({...f,reorderQty:e.target.value}))}/>
        </Field>
      </div>
    </Modal>}

    {/* ── STOCK ADJUST MODAL ── */}
    {adjModal&&<Modal title={adjType==='in'?`Stock In — ${adjModal.name}`:`Stock Out — ${adjModal.name}`}
      onClose={()=>{setAdjModal(null);setAdjQty('');}}
      footer={<>
        <button className="btn btn-ghost" onClick={()=>{setAdjModal(null);setAdjQty('');}}>Cancel</button>
        <button className={`btn ${adjType==='in'?'btn-success':'btn-danger'}`} onClick={doAdj}>{adjType==='in'?'↑ Stock In':'↓ Stock Out'}</button>
      </>}>
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        <button className={`btn ${adjType==='in'?'btn-success':'btn-secondary'}`} onClick={()=>setAdjType('in')}>↑ Stock In</button>
        <button className={`btn ${adjType==='out'?'btn-danger':'btn-secondary'}`} onClick={()=>setAdjType('out')}>↓ Stock Out</button>
      </div>
      <Field label="Quantity" required>
        <input type="number" min={1} value={adjQty} onChange={e=>setAdjQty(e.target.value)} placeholder="Enter quantity…"/>
      </Field>
      <div style={{fontSize:12,color:'var(--text2)',padding:'10px 12px',background:'var(--bg3)',borderRadius:8,marginTop:4}}>
        Current stock: <strong style={{fontFamily:'var(--mono)',color:'var(--text)'}}>{adjModal.qty}</strong>
        {adjQty&&<> → New stock: <strong style={{fontFamily:'var(--mono)',color:'var(--accent)'}}>{Math.max(0,adjModal.qty+(adjType==='in'?+adjQty:-+adjQty))}</strong></>}
      </div>
    </Modal>}
  </div>;
}

/* ═══════════════════════════════════════════════════
   PAGE: MOVE HISTORY
═══════════════════════════════════════════════════ */
function MoveHistory(){
  const {visibleMoves,warehouses,authUser}=useApp();
  const [search,setSearch]=useState('');
  const [typeF,setTypeF]=useState('');
  const [whF,setWhF]=useState('');

  const typePill={receipt:'pill-g',delivery:'pill-b',transfer:'pill-p',adjustment:'pill-a'};

  const filtered=visibleMoves.filter(m=>{
    if(search&&!m.productName.toLowerCase().includes(search.toLowerCase())&&!m.ref.toLowerCase().includes(search.toLowerCase())&&!(m.contact||'').toLowerCase().includes(search.toLowerCase()))return false;
    if(typeF&&m.type!==typeF)return false;
    if(whF&&m.warehouseId!==whF)return false;
    return true;
  });

  return <div className="page mod-history">
    <div className="pg-hdr">
      <div>
        <div className="pg-title">Move History</div>
        <div className="pg-sub">Immutable audit trail · {filtered.length} records{authUser?.role!=='Admin'?` for ${warehouses.find(w=>w.id===authUser?.warehouse)?.name}`:''}</div>
      </div>
    </div>
    <div className="frow">
      <SInput value={search} onChange={setSearch} placeholder="Search product, ref, or contact…" style={{maxWidth:280}}/>
      <select style={{maxWidth:155,fontSize:12,height:30,padding:'0 9px',borderRadius:20}} value={typeF} onChange={e=>setTypeF(e.target.value)}>
        <option value="">All Types</option>
        <option value="receipt">Receipt</option>
        <option value="delivery">Delivery</option>
        <option value="transfer">Transfer</option>
        <option value="adjustment">Adjustment</option>
      </select>
      {authUser?.role==='Admin'&&<select style={{maxWidth:190,fontSize:12,height:30,padding:'0 9px',borderRadius:20}} value={whF} onChange={e=>setWhF(e.target.value)}>
        <option value="">All Warehouses</option>
        {warehouses.map(w=><option key={w.id} value={w.id}>{w.code} — {w.name}</option>)}
      </select>}
      {(search||typeF||whF)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setSearch('');setTypeF('');setWhF('');}}>✕ Clear</button>}
    </div>
    <div className="card">
      <div className="tw"><table>
        <thead><tr><th>Reference ID</th><th>Type</th><th>Product</th><th>Contact</th><th>From</th><th>To</th><th>Qty</th><th>Date</th><th>Status</th></tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={9}><Empty icon="≡" title="No movements found" sub="Adjust filters or record a new operation"/></td></tr>}
          {filtered.map(m=>{
            const fromWh=warehouses.find(w=>w.id===m.fromWh);
            const toWh=m.toWh?warehouses.find(w=>w.id===m.toWh):null;
            return <tr key={m.id}>
              <td><code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:600}}>{m.ref}</code></td>
              <td><span className={`pill ${typePill[m.type]||'pill-x'}`} style={{fontSize:10}}>{m.type}</span></td>
              <td>
                <div style={{fontWeight:600,fontSize:12}}>{m.productName}</div>
                <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--mono)'}}>{m.sku}</div>
              </td>
              <td style={{fontSize:12,color:'var(--text2)'}}>{m.contact||<span style={{color:'var(--text3)'}}>—</span>}</td>
              <td style={{fontSize:12}}>{fromWh?<><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:600}}>{fromWh.code}</span><div style={{fontSize:10,color:'var(--text3)'}}>{fromWh.location}</div></>:<span style={{color:'var(--text3)'}}>—</span>}</td>
              <td style={{fontSize:12}}>{toWh?<><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:600}}>{toWh.code}</span><div style={{fontSize:10,color:'var(--text3)'}}>{toWh.location}</div></>:<span style={{color:'var(--text3)'}}>—</span>}</td>
              <td><span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:13,color:m.qty>0?'var(--green)':'var(--red)'}}>{m.qty>0?'+':''}{m.qty}</span></td>
              <td>
                <div style={{fontSize:11,color:'var(--text2)',fontFamily:'var(--mono)'}}>{fmtDate(m.date)}</div>
                <div style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{fmtTime(m.date)}</div>
              </td>
              <td><span className="pill pill-g" style={{fontSize:10}}>✓ done</span></td>
            </tr>;
          })}
        </tbody>
      </table></div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════════
   PAGE: SETTINGS
═══════════════════════════════════════════════════ */
function Settings(){
  const {lightTheme,setLightTheme,authUser}=useApp();
  const [notifs,setNotifs]=useState(true);
  const [lowStockAlert,setLowStockAlert]=useState(true);
  const [compactMode,setCompactMode]=useState(false);
  const [autoRef,setAutoRef]=useState(true);

  function Toggle({on,onToggle}){
    return <div className={`toggle${on?' on':''}`} onClick={onToggle}/>;
  }
  function SettingRow({label,desc,on,onToggle}){
    return <div className="setting-row">
      <div><div className="setting-label">{label}</div>{desc&&<div className="setting-desc">{desc}</div>}</div>
      <Toggle on={on} onToggle={onToggle}/>
    </div>;
  }

  return <div className="page mod-settings">
    <div className="pg-hdr">
      <div><div className="pg-title">Settings</div><div className="pg-sub">Application preferences & configuration</div></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,maxWidth:920}}>
      <div>
        {/* ── APPEARANCE ── */}
        <div className="card">
          <div className="card-hdr"><span className="card-title">🎨 Appearance</span></div>
          <div className="card-body">
            <SettingRow label="Pastel Light Theme" desc="Switch to vibrant pastel SaaS interface" on={lightTheme} onToggle={()=>setLightTheme(l=>!l)}/>
            <SettingRow label="Compact Mode" desc="Reduce row padding for higher density" on={compactMode} onToggle={()=>setCompactMode(c=>!c)}/>
          </div>
        </div>
        {/* ── USER PROFILE ── */}
        <div className="card" style={{marginTop:14}}>
          <div className="card-hdr"><span className="card-title">👤 User Profile</span></div>
          <div className="card-body">
            <div style={{display:'flex',alignItems:'center',gap:13,marginBottom:16,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
              <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),#6366f1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#fff',fontFamily:'var(--mono)',flexShrink:0}}>{authUser?.avatar}</div>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{authUser?.name}</div>
                <div style={{marginTop:4,display:'flex',gap:6,alignItems:'center'}}>
                  <span className={authUser?.role==='Admin'?'role-badge-admin':'role-badge-wh'}>{authUser?.role}</span>
                  {authUser?.warehouse&&<span className="pill pill-b" style={{fontSize:10}}>{authUser.warehouse}</span>}
                </div>
              </div>
            </div>
            <Field label="Display Name"><input defaultValue={authUser?.name}/></Field>
            <button className="btn btn-secondary btn-sm" style={{marginTop:4}}>Update Profile</button>
          </div>
        </div>
      </div>
      <div>
        {/* ── NOTIFICATIONS ── */}
        <div className="card">
          <div className="card-hdr"><span className="card-title">🔔 Notifications</span></div>
          <div className="card-body">
            <SettingRow label="Enable Notifications" desc="Show in-app alerts for stock events" on={notifs} onToggle={()=>setNotifs(n=>!n)}/>
            <SettingRow label="Low Stock Alerts" desc="Alert when product falls below minimum" on={lowStockAlert} onToggle={()=>setLowStockAlert(n=>!n)}/>
          </div>
        </div>
        {/* ── OPERATIONS ── */}
        <div className="card" style={{marginTop:14}}>
          <div className="card-hdr"><span className="card-title">⚙ Operations</span></div>
          <div className="card-body">
            <SettingRow label="Auto-generate Reference IDs" desc="Use WH-Code/OP/Sequence format" on={autoRef} onToggle={()=>setAutoRef(n=>!n)}/>
            <div className="div"/>
            <div style={{fontSize:12,color:'var(--text3)',marginBottom:10}}>Reference ID format preview:</div>
            <div className="receipt-id-box">{autoRef?'WH01/OP/042':'REC-042'}</div>
            <div className="fhint" style={{marginTop:6}}>{autoRef?'Format: Warehouse Code / OP / Sequence':'Format: Type prefix + Sequence'}</div>
          </div>
        </div>
        {/* ── ABOUT ── */}
        <div className="card" style={{marginTop:14}}>
          <div className="card-hdr"><span className="card-title">ℹ About</span></div>
          <div className="card-body">
            <table style={{width:'100%',fontSize:12}}>
              <tbody>
                {[['Version','2.1.0'],['Build','2025-07-12'],['Architecture','React 18 · Single File'],['Database','In-memory (demo)'],['Theme','Dual: Dark / Pastel Light']].map(([k,v])=><tr key={k}>
                  <td style={{color:'var(--text3)',paddingBottom:7,width:'42%'}}>{k}</td>
                  <td style={{fontFamily:'var(--mono)',color:'var(--text2)',fontWeight:600}}>{v}</td>
                </tr>)}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════ */
const PAGES={dashboard:Dashboard,operation:Operation,stock:Stock,history:MoveHistory,settings:Settings};

function App(){
  const {authed}=useApp();
  const [page,setPage]=useState('dashboard');
  const Page=PAGES[page]||Dashboard;
  if(!authed)return <AuthScreen/>;
  return <div className="shell">
    <Topbar page={page} setPage={setPage}/>
    <Sidebar page={page} setPage={setPage}/>
    <main className="main"><Page setPage={setPage}/></main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App/></AppProvider>
);
{% endraw %}
</script>
</body>
</html>
