<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoreIMS Enterprise — v2.0</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS — Dark (default) + Light Pastel override
═══════════════════════════════════════════════════ */
:root {
  /* ── DARK SURFACES ── */
  --bg:       #0b0e14;
  --bg2:      #121620;
  --bg3:      #181d2a;
  --bg4:      #1e2436;
  --bg5:      #252d43;
  /* ── DARK BORDERS ── */
  --border:   #1e2535;
  --border2:  #2b3450;
  --border3:  #3a4568;
  /* ── DARK TEXT ── */
  --text:     #e4eaf6;
  --text2:    #8b96ae;
  --text3:    #4a5570;
  /* ── ACCENT ── */
  --accent:       #3b82f6;
  --accent-bg:    #1a2d4e;
  --accent-hover: #2563eb;
  /* ── SEMANTIC DARK ── */
  --green:     #22c55e; --green-bg:  #0d2218;
  --amber:     #f59e0b; --amber-bg:  #201800;
  --red:       #ef4444; --red-bg:    #270e0e;
  --purple:    #a78bfa; --purple-bg: #1a1332;
  --teal:      #14b8a6; --teal-bg:   #091c1b;
  --rose:      #fb7185; --rose-bg:   #270f14;
  --sky:       #38bdf8; --sky-bg:    #0a1e2b;
  --mint:      #4ade80; --mint-bg:   #0d2418;
  --sun:       #fbbf24; --sun-bg:    #211500;
  /* ── TYPE ── */
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  /* ── LAYOUT ── */
  --sidebar-w: 210px;
  --topbar-h:  48px;
  --r:  6px;
  --r2: 12px;
  --r3: 16px;
  /* ── TRANSITIONS ── */
  --t: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─────────────────────────────────────────────────
   LIGHT / PASTEL INTERACTIVE THEME
───────────────────────────────────────────────── */
body.light-theme {
  --bg:       #f4f6fb;
  --bg2:      #ffffff;
  --bg3:      #eef1f8;
  --bg4:      #e5e9f4;
  --bg5:      #d8deee;
  --border:   #dde3f0;
  --border2:  #c9d1e4;
  --border3:  #b0bcd4;
  --text:     #0e1726;
  --text2:    #3d4d68;
  --text3:    #8a96b0;
  --accent:       #4f7ef8;
  --accent-bg:    #e6effe;
  --accent-hover: #3b6ef0;
  /* ── PASTEL SEMANTIC ── */
  --green:     #16a34a; --green-bg:  #dcfce7;
  --amber:     #d97706; --amber-bg:  #fef3c7;
  --red:       #dc2626; --red-bg:    #fee2e2;
  --purple:    #7c3aed; --purple-bg: #ede9fe;
  --teal:      #0d9488; --teal-bg:   #ccfbf1;
  --rose:      #e11d48; --rose-bg:   #ffe4e6;
  --sky:       #0284c7; --sky-bg:    #e0f2fe;
  --mint:      #15803d; --mint-bg:   #dcfce7;
  --sun:       #b45309; --sun-bg:    #fef9c3;
}

/* Module accent overrides for pastel light */
body.light-theme .mod-dashboard  { --mod-accent: var(--sky);   --mod-bg: var(--sky-bg); }
body.light-theme .mod-operation  { --mod-accent: var(--mint);  --mod-bg: var(--mint-bg); }
body.light-theme .mod-stock      { --mod-accent: var(--rose);  --mod-bg: var(--rose-bg); }
body.light-theme .mod-history    { --mod-accent: var(--purple);--mod-bg: var(--purple-bg); }
body.light-theme .mod-settings   { --mod-accent: var(--sun);   --mod-bg: var(--sun-bg); }

/* ── BASE RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  transition:var(--t);
}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{
  font-family:var(--font);
  color:var(--text);
  background:var(--bg3);
  border:1.5px solid var(--border2);
  border-radius:var(--r);
  padding:7px 11px;
  font-size:13px;
  outline:none;
  transition:var(--t);
  width:100%;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg2);box-shadow:0 0 0 3px var(--accent-bg)}
input::placeholder{color:var(--text3)}
input.invalid{border-color:var(--red)!important;box-shadow:0 0 0 3px var(--red-bg)!important}
select option{background:var(--bg3);color:var(--text)}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}

/* ═══════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════ */
.shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-rows:var(--topbar-h) 1fr;
  height:100vh;overflow:hidden;
}

/* ── TOPBAR ── */
.topbar{
  grid-column:1/-1;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 18px;gap:12px;z-index:50;
  transition:var(--t);
}
.topbar-logo{
  display:flex;align-items:center;gap:9px;
  min-width:calc(var(--sidebar-w) - 18px);
  font-size:13px;font-weight:700;letter-spacing:-.3px;color:var(--text);
}
.logo-sq{
  width:26px;height:26px;
  background:linear-gradient(135deg,var(--accent),#6366f1);
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;
  font-family:var(--mono);flex-shrink:0;
  box-shadow:0 2px 8px rgba(59,130,246,.35);
}
.topbar-search{flex:1;max-width:300px;position:relative}
.topbar-search input{padding-left:30px;font-size:12px;height:30px;padding-top:0;padding-bottom:0;border-radius:20px}
.topbar-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.t-btn{
  height:30px;padding:0 10px;border-radius:20px;
  background:transparent;border:1.5px solid var(--border2);
  color:var(--text2);font-size:12px;
  display:flex;align-items:center;gap:5px;
  cursor:pointer;transition:var(--t);white-space:nowrap;
  font-family:var(--font);
}
.t-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border3)}
.t-btn:active{transform:scale(0.98)}
.t-btn.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.user-chip{
  display:flex;align-items:center;gap:6px;
  padding:3px 10px 3px 3px;
  border:1.5px solid var(--border2);
  border-radius:20px;cursor:pointer;
  transition:var(--t);
}
.user-chip:hover{background:var(--bg3)}
.user-chip:active{transform:scale(0.98)}
.user-av{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
  font-family:var(--mono);flex-shrink:0;
}
.user-name{font-size:12px;color:var(--text2)}
.notif-wrap{position:relative}
.notif-pip{
  position:absolute;top:-2px;right:-2px;
  width:7px;height:7px;background:var(--red);
  border-radius:50%;border:2px solid var(--bg2);
}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
  transition:var(--t);
}
.nav-group{padding:14px 8px 4px}
.nav-label{
  font-size:10px;font-weight:700;
  color:var(--text3);text-transform:uppercase;
  letter-spacing:.9px;padding:0 9px 7px;
  display:block;
}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;
  border-radius:var(--r2);
  cursor:pointer;color:var(--text2);
  font-size:13px;font-weight:500;
  transition:var(--t);position:relative;
  white-space:nowrap;margin-bottom:2px;
}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--accent);border-radius:0 3px 3px 0;
}
.nav-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--red);color:#fff;
  border-radius:10px;font-size:9px;padding:1px 6px;font-weight:700;
  font-family:var(--mono);
}
.nav-badge-a{
  margin-left:auto;background:var(--amber-bg);color:var(--amber);
  border-radius:10px;font-size:9px;padding:1px 6px;font-weight:700;
  font-family:var(--mono);border:1px solid var(--amber);
}
.sidebar-foot{
  margin-top:auto;padding:10px;
  border-top:1px solid var(--border);
}

/* ── MAIN CONTENT ── */
.main{overflow-y:auto;background:var(--bg);transition:var(--t)}
.page{padding:22px 26px;min-height:100%}
.pg-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:22px;padding-bottom:18px;
  border-bottom:1px solid var(--border);
}
.pg-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.pg-sub{font-size:12px;color:var(--text3);margin-top:3px}
.pg-actions{display:flex;gap:7px;align-items:center}

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:var(--r2);
  font-size:12px;font-weight:600;
  cursor:pointer;transition:var(--t);
  border:1.5px solid transparent;
  font-family:var(--font);white-space:nowrap;height:32px;
  letter-spacing:.1px;
}
.btn:active{transform:scale(0.98)!important}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-secondary{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--border3)}
.btn-ghost{background:transparent;color:var(--text2);border-color:transparent;padding:7px 9px}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn-danger:hover{filter:brightness(1.08)}
.btn-success{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.btn-success:hover{filter:brightness(1.08)}
/* Pastel-aware module buttons in light theme */
body.light-theme .btn-mint{background:#dcfce7;color:#15803d;border-color:#4ade80}
body.light-theme .btn-mint:hover{background:#bbf7d0}
body.light-theme .btn-sky{background:#e0f2fe;color:#0284c7;border-color:#38bdf8}
body.light-theme .btn-sky:hover{background:#bae6fd}
body.light-theme .btn-rose{background:#ffe4e6;color:#e11d48;border-color:#fb7185}
body.light-theme .btn-rose:hover{background:#fecdd3}
.btn-sm{padding:4px 9px;font-size:11px;height:26px;border-radius:var(--r)}
.btn-xs{padding:2px 7px;font-size:11px;height:22px;border-radius:var(--r)}

/* ═══════════════════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r2);padding:16px 18px;
  transition:var(--t);cursor:default;
}
.stat:hover{border-color:var(--border3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.s-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.s-val{font-size:24px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1}
.s-sub{font-size:11px;color:var(--text3);margin-top:6px}
.s-up{color:var(--green)}.s-dn{color:var(--red)}
.s-tag{display:inline-block;font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:var(--r);margin-top:5px}
.s-tag-g{background:var(--green-bg);color:var(--green)}
.s-tag-r{background:var(--red-bg);color:var(--red)}
.s-tag-a{background:var(--amber-bg);color:var(--amber)}

/* ═══════════════════════════════════════════════════
   CARDS / PANELS
═══════════════════════════════════════════════════ */
.card{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
  transition:var(--t);
}
.card-hdr{
  padding:11px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.card-body{padding:18px}

/* ═══════════════════════════════════════════════════
   TABLES
═══════════════════════════════════════════════════ */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{
  text-align:left;padding:9px 13px;
  font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.7px;
  border-bottom:1.5px solid var(--border);
  background:var(--bg3);white-space:nowrap;
}
td{padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:var(--t)}
tbody tr:hover{background:var(--bg3)}
/* Light theme pastel row hovers */
body.light-theme .mod-dashboard tbody tr:hover{background:#e0f2fe22}
body.light-theme .mod-stock tbody tr:hover{background:#ffe4e622}
body.light-theme .mod-operation tbody tr:hover{background:#dcfce722}
body.light-theme .mod-history tbody tr:hover{background:#ede9fe22}

/* ═══════════════════════════════════════════════════
   BADGES / PILLS
═══════════════════════════════════════════════════ */
.pill{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:var(--r);
  font-size:11px;font-weight:700;
  font-family:var(--mono);white-space:nowrap;
  letter-spacing:.2px;
}
.pill-g{background:var(--green-bg);color:var(--green)}
.pill-r{background:var(--red-bg);color:var(--red)}
.pill-a{background:var(--amber-bg);color:var(--amber)}
.pill-b{background:var(--accent-bg);color:var(--accent)}
.pill-p{background:var(--purple-bg);color:var(--purple)}
.pill-t{background:var(--teal-bg);color:var(--teal)}
.pill-x{background:var(--bg4);color:var(--text3)}
.pill-rose{background:var(--rose-bg);color:var(--rose)}
.pill-sky{background:var(--sky-bg);color:var(--sky)}

/* ═══════════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(3px);
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);border:1.5px solid var(--border2);
  border-radius:var(--r3);width:90%;max-width:480px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  animation:slideUp .2s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-wide{max-width:680px}
.m-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg2);z-index:1;
}
.m-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.m-body{padding:20px}
.m-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ── FORM HELPERS ── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.fhint{font-size:11px;color:var(--text3);margin-top:2px}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.field-error{font-size:11px;color:var(--red);margin-top:3px;font-weight:600}

/* ── SEARCH INPUT ── */
.search-inp{position:relative;flex:1}
.search-inp input{padding-left:30px;font-size:12px;height:30px;padding-top:0;padding-bottom:0;border-radius:20px}
.search-inp .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}

/* ── EMPTY STATE ── */
.empty{padding:48px 24px;text-align:center}
.empty-ico{font-size:32px;opacity:.35;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:600;color:var(--text3)}
.empty-sub{font-size:12px;color:var(--text3);margin-top:5px}

/* ── TOAST ── */
.tc{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 16px;border-radius:var(--r2);
  background:var(--bg2);border:1.5px solid var(--border2);
  font-size:13px;color:var(--text);
  display:flex;align-items:center;gap:9px;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  animation:slideUp .2s ease;min-width:240px;
}

/* ── STOCK BAR ── */
.sbar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px;width:80px}
.sbar-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ── RECEIPT ID BOX ── */
.receipt-id-box{
  font-family:var(--mono);font-size:12px;font-weight:600;
  color:var(--accent);background:var(--accent-bg);
  border:1.5px solid var(--accent);border-radius:var(--r);
  padding:5px 10px;display:inline-block;letter-spacing:.5px;
}

/* ── AUTH ── */
.auth-wrap{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:var(--t);
}
body.light-theme .auth-wrap{
  background:linear-gradient(135deg,#e0f2fe 0%,#f4f6fb 40%,#ede9fe 100%);
}
.auth-card{
  background:var(--bg2);border:1.5px solid var(--border2);
  border-radius:var(--r3);width:380px;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.35);
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
.auth-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:24px;text-align:center}
.auth-logo-row{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:3px}
.auth-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.auth-sub{font-size:12px;color:var(--text3);margin-top:2px}
.auth-tabs{display:flex;border-bottom:1px solid var(--border)}
.auth-tab{
  flex:1;padding:11px;font-size:12px;font-weight:700;
  text-align:center;cursor:pointer;color:var(--text3);
  border-bottom:2px solid transparent;
  transition:var(--t);
}
.auth-tab.on{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
.auth-body{padding:22px}
.otp-row{display:flex;gap:9px;justify-content:center;margin:13px 0}
.otp-box{
  width:44px;height:48px;text-align:center;
  font-size:20px;font-weight:700;font-family:var(--mono);
  border-radius:var(--r);background:var(--bg3);
  border:1.5px solid var(--border2);color:var(--text);
  max-width:44px;
}
.otp-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.demo-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);padding:9px 13px;margin-top:14px;
  font-size:11px;color:var(--text3);font-family:var(--mono);
}
.forgot-link{
  display:block;text-align:center;font-size:11px;
  color:var(--text3);cursor:pointer;margin-top:9px;
  transition:color .2s ease;
}
.forgot-link:hover{color:var(--accent)}

/* ── CHARTS ── */
.chart-wrap{display:flex;align-items:flex-end;gap:5px;height:110px;padding-top:12px}
.ch-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.ch-bar{
  width:100%;border-radius:4px 4px 0 0;
  cursor:pointer;min-height:4px;
  background:var(--accent);opacity:.7;
  transition:opacity .15s,transform .1s;
  transform-origin:bottom;
}
.ch-bar:hover{opacity:1;transform:scaleY(1.04)}
.ch-lbl{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* ── DIVIDER ── */
.div{height:1px;background:var(--border);margin:14px 0}

/* ── TABS ── */
.page-tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:18px;gap:0}
.page-tab{
  padding:8px 16px;font-size:12px;font-weight:600;
  color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:var(--t);white-space:nowrap;
  margin-bottom:-1.5px;
}
.page-tab.on{color:var(--accent);border-color:var(--accent)}
.page-tab:hover:not(.on){color:var(--text)}

/* ── SETTINGS ── */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:1px solid var(--border);
}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;color:var(--text);font-weight:500}
.setting-desc{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{
  width:38px;height:21px;border-radius:11px;
  background:var(--bg4);border:1.5px solid var(--border2);
  position:relative;cursor:pointer;transition:var(--t);flex-shrink:0;
}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:15px;height:15px;border-radius:50%;
  background:#fff;transition:transform .2s ease;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after{transform:translateX(17px)}

/* ── BILL MODAL ── */
.bill-modal{max-width:640px}
.bill-hdr{background:var(--bg3);border-bottom:2px solid var(--border2);padding:22px 26px}
.bill-logo-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.bill-company{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.bill-company-sub{font-size:11px;color:var(--text3);margin-top:2px}
.bill-ref{text-align:right}
.bill-ref-id{font-family:var(--mono);font-size:17px;font-weight:800;color:var(--accent)}
.bill-ref-date{font-size:11px;color:var(--text3);margin-top:4px}
.bill-parties{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.bill-party-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:5px}
.bill-party-name{font-size:13px;font-weight:700;color:var(--text)}
.bill-party-sub{font-size:11px;color:var(--text3);line-height:1.7}
.bill-body{padding:0}
.bill-table th{background:var(--bg4);font-size:10px;padding:10px 15px}
.bill-table td{font-size:12px;padding:10px 15px}
.bill-table .num{font-family:var(--mono);text-align:right}
.bill-totals{padding:15px 22px;border-top:1px solid var(--border2);background:var(--bg3)}
.bill-total-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:var(--text2)}
.bill-total-row.grand{font-size:14px;font-weight:800;color:var(--text);border-top:1.5px solid var(--border2);padding-top:9px;margin-top:9px}
.bill-total-row .num{font-family:var(--mono)}
.bill-status-strip{padding:11px 22px;font-size:11px;font-weight:800;text-align:center;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}
.bill-status-strip.paid{background:var(--green-bg);color:var(--green);border-top:1.5px solid var(--green)}
.bill-status-strip.pending{background:var(--amber-bg);color:var(--amber);border-top:1.5px solid var(--amber)}
.bill-foot{padding:13px 22px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center}

/* ── WAREHOUSE CARDS ── */
.wh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.wh-card{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r2);padding:16px 18px;
  transition:var(--t);cursor:default;
}
.wh-card:hover{border-color:var(--border3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
body.light-theme .wh-card:hover{border-color:var(--sky);box-shadow:0 4px 16px rgba(2,132,199,.08)}
.wh-code{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px;letter-spacing:.5px}
.wh-name{font-size:13px;font-weight:700;color:var(--text)}
.wh-addr{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.6}
.wh-meta{display:flex;gap:14px;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.wh-meta-item{font-size:11px;color:var(--text3)}
.wh-meta-val{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text2)}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:800px){.wh-grid{grid-template-columns:1fr}}
@media(max-width:640px){
  :root{--sidebar-w:0px}
  .sidebar{display:none}
  .page{padding:14px}
}

/* ── PASTEL LIGHT accents for page-level modules ── */
body.light-theme .pg-hdr{border-color:var(--mod-accent,var(--border))}
body.light-theme .stat:hover{box-shadow:0 4px 20px rgba(79,126,248,.10)}

/* ── ROLE BADGE ── */
.role-badge-admin{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent);border-radius:var(--r);font-size:10px;font-weight:700;padding:1px 7px;font-family:var(--mono);letter-spacing:.3px}
.role-badge-wh{background:var(--green-bg);color:var(--green);border:1px solid var(--green);border-radius:var(--r);font-size:10px;font-weight:700;padding:1px 7px;font-family:var(--mono);letter-spacing:.3px}

/* ── RECOVERY MODAL ── */
.recovery-step{text-align:center;padding:8px 0}
.recovery-icon{font-size:38px;margin-bottom:14px}
.recovery-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:7px}
.recovery-sub{font-size:12px;color:var(--text3);line-height:1.7}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
{% raw %}
const {useState,useEffect,useRef,useCallback,createContext,useContext,useMemo}=React;

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
const genId  = () => Math.random().toString(36).slice(2,9).toUpperCase();
const now    = () => new Date().toISOString();
const fmtDate= d  => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime= d  => new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
const fmtNum = n  => Number(n).toLocaleString('en-IN');
const fmtRupee=n  => `₹${fmtNum(Number(n).toFixed(2))}`;

/* ═══════════════════════════════════════════════════
   SEED DATA
═══════════════════════════════════════════════════ */
const WAREHOUSES=[
  {id:'WH01',code:'WH01',name:'Main Warehouse',address:'Plot 42, GIDC Industrial Estate, Vatva, Ahmedabad — 382445',location:'Ahmedabad',skus:8,value:1240000},
  {id:'WH02',code:'WH02',name:'North Distribution Hub',address:'Survey No. 114, NH-48 Bypass, Surat — 395010',location:'Surat',skus:5,value:320000},
  {id:'WH03',code:'WH03',name:'South Depot',address:'No. 7, Makarpura GIDC, Vadodara — 390010',location:'Vadodara',skus:4,value:180000},
];
const CATEGORIES=[
  {id:'cat1',name:'Electronics'},{id:'cat2',name:'Raw Materials'},
  {id:'cat3',name:'Finished Goods'},{id:'cat4',name:'Packaging'},{id:'cat5',name:'Spare Parts'},
];
const UNITS=[
  {id:'u1',name:'Pieces',abbr:'pcs'},{id:'u2',name:'Kilograms',abbr:'kg'},
  {id:'u3',name:'Litres',abbr:'ltr'},{id:'u4',name:'Meters',abbr:'mtr'},
  {id:'u5',name:'Boxes',abbr:'box'},{id:'u6',name:'Rolls',abbr:'roll'},
];
const VENDORS=[
  {id:'v1',name:'TechSupply Co.',contact:'Rajesh Patel',phone:'98765 43210',gstin:'24AABCT1234A1Z5'},
  {id:'v2',name:'RawMat Industries',contact:'Sunita Shah',phone:'87654 32109',gstin:'24AADCR5678B2Z6'},
  {id:'v3',name:'PackPro Ltd.',contact:'Amit Kumar',phone:'76543 21098',gstin:'24AAEPP9012C3Z7'},
  {id:'v4',name:'SpareZone',contact:'Meena Trivedi',phone:'65432 10987',gstin:'24AAFSZ3456D4Z8'},
];
const CUSTOMERS=[
  {id:'c1',name:'Infosys Ltd.',contact:'Aarav Mehta',phone:'91111 22222',gstin:'29AAACI1234A1Z5'},
  {id:'c2',name:'TCS Projects',contact:'Priya Singh',phone:'92222 33333',gstin:'27AAACT5678B2Z6'},
  {id:'c3',name:'Reliance Industries',contact:'Vivek Joshi',phone:'93333 44444',gstin:'27AAACR9012C3Z7'},
];

function seedProducts(){return [
  {id:'p1',sku:'SKU-001',name:'Arduino Uno R3',category:'cat1',unit:'u1',vendor:'v1',warehouse:'WH01',qty:145,minQty:50,reorderQty:200,cost:320,price:599,status:'active'},
  {id:'p2',sku:'SKU-002',name:'Copper Wire 1mm',category:'cat2',unit:'u4',vendor:'v2',warehouse:'WH01',qty:18,minQty:50,reorderQty:500,cost:42,price:85,status:'active'},
  {id:'p3',sku:'SKU-003',name:'PCB Board 10×10',category:'cat3',unit:'u5',vendor:'v1',warehouse:'WH02',qty:0,minQty:20,reorderQty:100,cost:180,price:320,status:'active'},
  {id:'p4',sku:'SKU-004',name:'Bubble Wrap Roll',category:'cat4',unit:'u6',vendor:'v3',warehouse:'WH01',qty:87,minQty:30,reorderQty:150,cost:280,price:420,status:'active'},
  {id:'p5',sku:'SKU-005',name:'Bearing 6205',category:'cat5',unit:'u1',vendor:'v4',warehouse:'WH03',qty:312,minQty:100,reorderQty:500,cost:95,price:180,status:'active'},
  {id:'p6',sku:'SKU-006',name:'Epoxy Resin 1kg',category:'cat2',unit:'u2',vendor:'v2',warehouse:'WH02',qty:9,minQty:25,reorderQty:100,cost:650,price:1100,status:'active'},
  {id:'p7',sku:'SKU-007',name:'Raspberry Pi 4B',category:'cat1',unit:'u1',vendor:'v1',warehouse:'WH01',qty:62,minQty:30,reorderQty:150,cost:3800,price:5500,status:'active'},
  {id:'p8',sku:'SKU-008',name:'PVC Pipe 1 inch',category:'cat3',unit:'u4',vendor:'v2',warehouse:'WH03',qty:230,minQty:100,reorderQty:500,cost:28,price:55,status:'inactive'},
];}

function seedMoves(products){
  const types=['receipt','delivery','transfer','adjustment'];
  return Array.from({length:20},(_,i)=>{
    const p=products[i%products.length];
    const type=types[i%4];
    const qty=type==='delivery'?-(Math.floor(Math.random()*20)+5):(Math.floor(Math.random()*50)+10);
    const fromWh=type==='transfer'?'WH01':p.warehouse;
    const toWh=type==='transfer'?'WH02':null;
    const vendor=VENDORS[i%VENDORS.length];
    const customer=CUSTOMERS[i%CUSTOMERS.length];
    return {
      id:genId(),ref:`${type==='receipt'?'REC':type==='delivery'?'DEL':type==='transfer'?'TRF':'ADJ'}-${String(1000+i)}`,
      productId:p.id,productName:p.name,sku:p.sku,type,qty,
      warehouseId:p.warehouse,fromWh,toWh,
      contact:type==='receipt'?vendor.name:type==='delivery'?customer.name:null,
      user:'Priya Sharma',
      date:new Date(Date.now()-i*3600000*6).toISOString(),
      note:'',status:'done',
    };
  });
}

function seedReceipts(){
  // Track receipt counts per warehouse for auto-ID generation
  return [
    {id:'r1',ref:'WH01/OP/001',vendor:'v1',warehouse:'WH01',scheduleDate:new Date(Date.now()-86400000).toISOString(),date:new Date(Date.now()-86400000).toISOString(),status:'done',items:[{productId:'p1',qty:100},{productId:'p7',qty:50}],total:442500,createdBy:'Priya Sharma'},
    {id:'r2',ref:'WH02/OP/002',vendor:'v2',warehouse:'WH02',scheduleDate:new Date(Date.now()+86400000).toISOString(),date:new Date(Date.now()-172800000).toISOString(),status:'pending',items:[{productId:'p2',qty:200},{productId:'p6',qty:30}],total:27900,createdBy:'Rahul Mehta'},
    {id:'r3',ref:'WH01/OP/003',vendor:'v3',warehouse:'WH01',scheduleDate:new Date(Date.now()-259200000).toISOString(),date:new Date(Date.now()-259200000).toISOString(),status:'done',items:[{productId:'p4',qty:80}],total:22400,createdBy:'Priya Sharma'},
  ];
}

function seedDeliveries(){return [
  {id:'d1',ref:'WH01/OP/004',customer:'c1',warehouse:'WH01',scheduleDate:new Date(Date.now()-43200000).toISOString(),date:new Date(Date.now()-43200000).toISOString(),status:'shipped',items:[{productId:'p1',qty:20},{productId:'p7',qty:10}],total:91400,createdBy:'Rahul Mehta'},
  {id:'d2',ref:'WH02/OP/005',customer:'c2',warehouse:'WH02',scheduleDate:new Date(Date.now()+172800000).toISOString(),date:new Date(Date.now()-86400000).toISOString(),status:'draft',items:[{productId:'p3',qty:15}],total:4800,createdBy:'Priya Sharma'},
  {id:'d3',ref:'WH01/OP/006',customer:'c3',warehouse:'WH01',scheduleDate:new Date(Date.now()-172800000).toISOString(),date:new Date(Date.now()-172800000).toISOString(),status:'done',items:[{productId:'p5',qty:100}],total:18000,createdBy:'Admin'},
];}

/* Receipt counter per warehouse (for auto-ID) */
const recCounters={WH01:3,WH02:2,WH03:0};
const genReceiptRef=(whCode,warehouses)=>{
  const wh=warehouses.find(w=>w.code===whCode||w.id===whCode);
  if(!wh)return `${whCode}/OP/001`;
  recCounters[wh.id]=(recCounters[wh.id]||0)+1;
  return `${wh.code}/OP/${String(recCounters[wh.id]).padStart(3,'0')}`;
};

/* ═══════════════════════════════════════════════════
   APP CONTEXT
═══════════════════════════════════════════════════ */
const Ctx=createContext(null);
const useApp=()=>useContext(Ctx);

function AppProvider({children}){
  const [authed,setAuthed]=useState(false);
  const [authUser,setAuthUser]=useState(null);
  const [lightTheme,setLightTheme]=useState(false);
  
  const [products,setProducts]=useState([]);
  const [moves,setMoves]=useState([]);
  const [receipts,setReceipts]=useState([]);
  const [deliveries,setDeliveries]=useState([]);
  
  const [warehouses, setWarehouses] = useState(WAREHOUSES);
  const [categories, setCategories] = useState(CATEGORIES);
  const [units, setUnits] = useState(UNITS);
  const [vendors, setVendors] = useState(VENDORS);
  const [customers, setCustomers] = useState(CUSTOMERS);
  
  const [toasts,setToasts]=useState([]);

  useEffect(() => {
    async function initData() {
      try {
        const fetchJson = async (url) => {
          try {
            const r = await fetch(url);
            if (!r.ok) return [];
            return await r.json();
          } catch(e) { return []; }
        };

        const [wRes, cRes, uRes, vRes, cuRes, pRes, sRes, rhRes, rcRes] = await Promise.all([
          fetchJson('/warehouses'),
          fetchJson('/categories'),
          fetchJson('/units'),
          fetchJson('/vendors'),
          fetchJson('/customers'),
          fetchJson('/products'),
          fetchJson('/inventory/stock'),
          fetchJson('/operations/history'),
          fetchJson('/operations/receipts'),
        ]);

        const wList = wRes.map(w => ({...w, id: w.id.toString(), code: w.name.substring(0,4).toUpperCase(), value: 0, skus: 0}));
        const cList = cRes.map(c => ({...c, id: c.category_id.toString()}));
        const uList = uRes.map(u => ({...u, id: u.unit_id.toString()}));
        const vList = vRes.map(v => ({...v, id: v.vendor_id.toString()}));
        const cuList = cuRes.map(cu => ({...cu, id: cu.customer_id.toString()}));

        if(wList.length > 0) setWarehouses(wList);
        if(cList.length > 0) setCategories(cList);
        if(uList.length > 0) setUnits(uList);
        if(vList.length > 0) setVendors(vList);
        if(cuList.length > 0) setCustomers(cuList);

        if (pRes.length > 0) {
           const processedProducts = [];
           pRes.forEach(p => {
               const pStocks = sRes.filter(s => s.product_id === p.product_id);
               if (pStocks.length === 0) {
                 processedProducts.push({
                   id: p.product_id.toString(),
                   sku: p.sku,
                   name: p.name,
                   category: p.category_id ? p.category_id.toString() : 'cat1',
                   unit: p.unit_id ? p.unit_id.toString() : 'u1',
                   warehouse: wList.length > 0 ? wList[0].id : 'WH01',
                   qty: 0,
                   minQty: p.reorder_level || 10,
                   reorderQty: 100,
                   cost: p.cost_price || 0,
                   price: p.selling_price || 0,
                   status: 'active'
                 });
               } else {
                 pStocks.forEach(st => {
                   processedProducts.push({
                     id: p.product_id.toString() + '_' + st.warehouse_id,
                     real_id: p.product_id.toString(),
                     sku: p.sku,
                     name: p.name,
                     category: p.category_id ? p.category_id.toString() : 'cat1',
                     unit: p.unit_id ? p.unit_id.toString() : 'u1',
                     warehouse: st.warehouse_id.toString(),
                     qty: st.stock || 0,
                     minQty: p.reorder_level || 10,
                     cost: p.cost_price || 0,
                     price: p.selling_price || 0,
                     status: 'active'
                   });
                 });
               }
           });
           setProducts(processedProducts);
        } else {
           setProducts(seedProducts());
        }

        if (rhRes.length > 0) {
           setMoves(rhRes.map((m, i) => ({
             id: 'm'+i,
             ref: m.reference,
             productId: m.product_id.toString(),
             qty: m.change,
             type: m.type === 'IN' ? 'receipt' : m.type === 'OUT' ? 'delivery' : 'transfer',
             warehouseId: m.warehouse_id.toString(),
             date: m.created_at,
             status: 'done'
           })));
        } else {
           setMoves(seedMoves(seedProducts()));
        }

        if (rcRes.length > 0) {
           setReceipts(rcRes.map(r => ({
              id: r.receipt_id.toString(),
              ref: r.reference,
              warehouse: r.warehouse_id.toString(),
              status: r.status,
              date: new Date().toISOString(),
              items: [],
              total: 0
           })));
        } else {
           setReceipts(seedReceipts());
        }
        
        setDeliveries(seedDeliveries());
      } catch(e) { console.error("Data load error", e); }
    }
    initData();
  }, []);

  /* Apply theme class to body */
  useEffect(()=>{
    document.body.classList.toggle('light-theme',lightTheme);
  },[lightTheme]);

  const toast=(msg,type='success')=>{
    const id=genId();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3400);
  };

  const addMove=(move)=>{
    const m={...move,id:genId(),date:now(),user:authUser?.name||'System'};
    setMoves(prev=>[m,...prev]);
    setProducts(prev=>prev.map(p=>p.id===move.productId?{...p,qty:Math.max(0,p.qty+move.qty)}:p));
  };

  const visibleWarehouses=useMemo(()=>{
    if(!authUser||authUser.role==='Admin')return warehouses;
    return warehouses.filter(w=>w.id===authUser.warehouse);
  },[authUser, warehouses]);

  const visibleProducts=useMemo(()=>{
    if(!authUser||authUser.role==='Admin')return products;
    return products.filter(p=>p.warehouse===authUser.warehouse);
  },[authUser,products]);

  const visibleMoves=useMemo(()=>{
    if(!authUser||authUser.role==='Admin')return moves;
    return moves.filter(m=>m.warehouseId===authUser.warehouse);
  },[authUser,moves]);

  const visibleReceipts=useMemo(()=>{
    if(!authUser||authUser.role==='Admin')return receipts;
    return receipts.filter(r=>r.warehouse===authUser.warehouse);
  },[authUser,receipts]);

  const visibleDeliveries=useMemo(()=>{
    if(!authUser||authUser.role==='Admin')return deliveries;
    return deliveries.filter(d=>d.warehouse===authUser.warehouse);
  },[authUser,deliveries]);

  const lowStock=visibleProducts.filter(p=>p.qty>0&&p.qty<=p.minQty&&p.status==='active');
  const outOfStock=visibleProducts.filter(p=>p.qty===0&&p.status==='active');

  const ctx={
    authed,setAuthed,authUser,setAuthUser,
    lightTheme,setLightTheme,
    products,setProducts,
    moves,setMoves,
    receipts,setReceipts,
    deliveries,setDeliveries,
    visibleWarehouses,visibleProducts,visibleMoves,visibleReceipts,visibleDeliveries,
    addMove,toast,lowStock,outOfStock,
    categories,units,
    warehouses, vendors,customers,
    genReceiptRef,
  };

  return <Ctx.Provider value={ctx}>
    {children}
    {toasts.length>0&&<div className="tc">{toasts.map(t=><Toast key={t.id}{...t}/>)}</div>}
  </Ctx.Provider>;
}

/* ═══════════════════════════════════════════════════
   UI ATOMS
═══════════════════════════════════════════════════ */
function Toast({msg,type}){
  const ico={success:'✓',error:'✕',info:'ℹ'};
  const col={success:'var(--green)',error:'var(--red)',info:'var(--accent)'};
  return <div className={`toast ${type}`}>
    <span style={{color:col[type],fontWeight:800,fontSize:14}}>{ico[type]}</span>{msg}
  </div>;
}

function Modal({title,onClose,children,footer,wide}){
  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className={`modal${wide?' modal-wide':''}`}>
      <div className="m-hdr">
        <span className="m-title">{title}</span>
        <button className="btn btn-ghost btn-sm" onClick={onClose} style={{fontSize:15,lineHeight:1}}>✕</button>
      </div>
      <div className="m-body">{children}</div>
      {footer&&<div className="m-foot">{footer}</div>}
    </div>
  </div>;
}

/* Status badge with light-theme pastel variants */
function SBadge({status}){
  const m={
    active:  ['pill-g','● Active'],   inactive:['pill-x','● Inactive'],
    done:    ['pill-g','✓ Done'],      pending: ['pill-a','⏳ Pending'],
    draft:   ['pill-x','◌ Draft'],     shipped: ['pill-b','→ Shipped'],
    cancelled:['pill-r','✕ Cancelled'],
  };
  const [c,l]=m[status]||['pill-x',status];
  return <span className={`pill ${c}`}>{l}</span>;
}

function StockBar({qty,minQty}){
  const pct=minQty>0?Math.min(100,Math.round(qty/minQty*100)):100;
  const color=pct===0?'var(--red)':pct<50?'var(--amber)':'var(--green)';
  return <div className="sbar"><div className="sbar-fill" style={{width:`${pct}%`,background:color}}/></div>;
}

function SInput({value,onChange,placeholder='Search…',style={}}){
  return <div className="search-inp" style={style}>
    <span className="si">⌕</span>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
  </div>;
}

function Empty({icon='⊡',title='No records found',sub=''}){
  return <div className="empty">
    <div className="empty-ico">{icon}</div>
    <div className="empty-title">{title}</div>
    {sub&&<div className="empty-sub">{sub}</div>}
  </div>;
}

/* Reusable field with validation */
function Field({label,required,error,children}){
  return <div className="fg">
    <label className="fl">{label}{required&&<span style={{color:'var(--red)',marginLeft:3}}>*</span>}</label>
    {children}
    {error&&<div className="field-error">⚠ {error}</div>}
  </div>;
}

/* ═══════════════════════════════════════════════════
   FORGOT PASSWORD MODAL
═══════════════════════════════════════════════════ */
function ForgotPasswordModal({onClose}){
  const [step,setStep]=useState(1);// 1=email, 2=sent, 3=done
  const [email,setEmail]=useState('');
  const [err,setErr]=useState('');

  const submit=()=>{
    if(!email.includes('@')){setErr('Please enter a valid email address.');return;}
    setErr('');setStep(2);
    setTimeout(()=>setStep(3),2000);
  };

  return <Modal title="Account Recovery" onClose={onClose}
    footer={step===1?<>
      <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
      <button className="btn btn-primary" onClick={submit}>Send Reset Link</button>
    </>:<button className="btn btn-primary" onClick={onClose} style={{width:'100%',justifyContent:'center'}}>Back to Login</button>}>
    {step===1&&<>
      <div className="recovery-step">
        <div className="recovery-icon">🔑</div>
        <div className="recovery-title">Forgot your password?</div>
        <div className="recovery-sub">Enter your admin email and we'll send a reset link within minutes.</div>
      </div>
      <div style={{marginTop:18}}>
        <Field label="Admin Email" required error={err}>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@coreims.in" className={err?'invalid':''}/>
        </Field>
      </div>
    </>}
    {step===2&&<div className="recovery-step">
      <div className="recovery-icon" style={{animation:'fadeIn .4s ease'}}>📨</div>
      <div className="recovery-title">Sending reset link…</div>
      <div className="recovery-sub" style={{color:'var(--text3)'}}>Please wait a moment.</div>
    </div>}
    {step===3&&<div className="recovery-step">
      <div className="recovery-icon">✅</div>
      <div className="recovery-title">Check your inbox</div>
      <div className="recovery-sub">A password reset link has been sent to <strong style={{color:'var(--accent)'}}>{email}</strong>. The link expires in 30 minutes.</div>
    </div>}
  </Modal>;
}

/* ═══════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════ */
function AuthScreen(){
  const {setAuthed,setAuthUser,toast}=useApp();
  const [tab,setTab]=useState('admin');
  const [email,setEmail]=useState('admin@coreims.in');
  const [pass,setPass]=useState('admin123');
  const [warehouseId,setWarehouseId]=useState('WH01');
  const [pin,setPin]=useState(['','','','']);
  const [loading,setLoading]=useState(false);
  const [showForgot,setShowForgot]=useState(false);
  const pinRefs=useRef([]);

  const loginAdmin=()=>{
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      if(email&&pass.length>=6){
        setAuthUser({name:'Priya Sharma',email,role:'Admin',avatar:'PS',warehouse:null});
        setAuthed(true);toast('Welcome back, Priya Sharma! 👋');
      }else toast('Invalid credentials — check email and password.','error');
    },700);
  };

  const loginWh=()=>{
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      const code=pin.join('');
      if(code==='1234'){
        const wh=WAREHOUSES.find(w=>w.id===warehouseId);
        setAuthUser({name:`${wh.name} Operator`,email:'',role:'Warehouse Staff',avatar:wh.code,warehouse:warehouseId});
        setAuthed(true);toast(`Logged in as ${wh.name}`);
      }else toast('Invalid PIN — try 1234','error');
    },700);
  };

  const chPin=(i,v)=>{
    if(!/^\d*$/.test(v))return;
    const n=[...pin];n[i]=v;setPin(n);
    if(v&&i<3)pinRefs.current[i+1]?.focus();
  };

  return <>
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-header">
          <div className="auth-logo-row">
            <div className="logo-sq">C</div>
            <span className="auth-title">CoreIMS</span>
          </div>
          <div className="auth-sub">Enterprise Inventory Management</div>
        </div>
        <div className="auth-tabs">
          <div className={`auth-tab${tab==='admin'?' on':''}`} onClick={()=>setTab('admin')}>🔐 Admin Login</div>
          <div className={`auth-tab${tab==='warehouse'?' on':''}`} onClick={()=>setTab('warehouse')}>🏭 Warehouse Login</div>
        </div>
        <div className="auth-body">
          {tab==='admin'?<>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
              <Field label="Email" required><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@coreims.in"/></Field>
              <Field label="Password" required><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"/></Field>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',height:36}} onClick={loginAdmin} disabled={loading}>
              {loading?'Signing in…':'Sign In →'}
            </button>
            <span className="forgot-link" onClick={()=>setShowForgot(true)}>Forgot password?</span>
            <div className="demo-box">Demo: admin@coreims.in / admin123</div>
          </>:<>
            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
              <Field label="Select Warehouse" required>
                <select value={warehouseId} onChange={e=>setWarehouseId(e.target.value)}>
                  {WAREHOUSES.map(w=><option key={w.id} value={w.id}>{w.code} — {w.name}</option>)}
                </select>
              </Field>
              <Field label="4-Digit PIN" required>
                <div className="otp-row">
                  {pin.map((v,i)=><input key={i} ref={el=>pinRefs.current[i]=el} className="otp-box" maxLength={1} value={v} onChange={e=>chPin(i,e.target.value)} type="password"/>)}
                </div>
              </Field>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',height:36}} onClick={loginWh} disabled={loading}>
              {loading?'Signing in…':'Sign In →'}
            </button>
            <div className="demo-box">Demo PIN: 1234</div>
          </>}
        </div>
      </div>
    </div>
    {showForgot&&<ForgotPasswordModal onClose={()=>setShowForgot(false)}/>}
  </>;
}

function BillModal({doc,type,onClose}){
  const {products,vendors,customers,warehouses}=useApp();
  const vendor=vendors.find(v=>v.id===doc.vendor);
  const customer=customers.find(c=>c.id===doc.customer);
  const wh=warehouses.find(w=>w.id===doc.warehouse);
  const contact=type==='receipt'?vendor:customer;
  const isReceipt=type==='receipt';

  const items=doc.items.map(it=>{
    const p=products.find(x=>x.id===it.productId);
    const unitPrice=isReceipt?p?.cost:p?.price;
    return {...it,name:p?.name||'—',sku:p?.sku||'—',unitPrice,lineTotal:(unitPrice||0)*it.qty};
  });
  const subtotal=items.reduce((s,i)=>s+i.lineTotal,0);
  const gst=subtotal*0.18;
  const grand=subtotal+gst;

  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal bill-modal" style={{maxWidth:640}}>
      <div className="bill-hdr">
        <div className="bill-logo-row">
          <div>
            <div className="bill-company">CoreIMS Pvt. Ltd.</div>
            <div className="bill-company-sub">GSTIN: 24AABCC1234A1Z5 · CIN: U74999GJ2020PTC113456</div>
            <div className="bill-company-sub">Plot 42, GIDC Industrial Estate, Ahmedabad — 382445</div>
          </div>
          <div className="bill-ref">
            <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',color:'var(--text3)',letterSpacing:'.7px',marginBottom:4}}>{isReceipt?'Purchase Receipt':'Delivery Invoice'}</div>
            <div className="bill-ref-id">{doc.ref}</div>
            <div className="bill-ref-date">{fmtDate(doc.date)} · {fmtTime(doc.date)}</div>
          </div>
        </div>
        <div className="bill-parties">
          <div>
            <div className="bill-party-label">{isReceipt?'Vendor (From)':'Bill To'}</div>
            <div className="bill-party-name">{contact?.name||'—'}</div>
            <div className="bill-party-sub">
              {contact?.contact&&<>{contact.contact}<br/></>}
              {contact?.phone&&<>{contact.phone}<br/></>}
              {contact?.gstin&&<span style={{fontFamily:'var(--mono)',fontSize:10}}>GSTIN: {contact.gstin}</span>}
            </div>
          </div>
          <div>
            <div className="bill-party-label">{isReceipt?'Ship To':'Ship From'}</div>
            <div className="bill-party-name">{wh?.name||'—'}</div>
            <div className="bill-party-sub">{wh?.address}</div>
          </div>
        </div>
      </div>
      <div className="bill-body">
        <div className="tw">
          <table className="bill-table">
            <thead><tr>
              <th>#</th><th>SKU</th><th>Product</th>
              <th style={{textAlign:'right'}}>Qty</th>
              <th style={{textAlign:'right'}}>Unit Price</th>
              <th style={{textAlign:'right'}}>Total</th>
            </tr></thead>
            <tbody>
              {items.map((it,i)=><tr key={i}>
                <td style={{color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11}}>{i+1}</td>
                <td><code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)'}}>{it.sku}</code></td>
                <td style={{fontWeight:600}}>{it.name}</td>
                <td className="num">{it.qty}</td>
                <td className="num">{fmtRupee(it.unitPrice||0)}</td>
                <td className="num" style={{fontWeight:700}}>{fmtRupee(it.lineTotal)}</td>
              </tr>)}
            </tbody>
          </table>
        </div>
        <div className="bill-totals">
          <div className="bill-total-row"><span>Subtotal</span><span className="num">{fmtRupee(subtotal)}</span></div>
          <div className="bill-total-row"><span>GST (18%)</span><span className="num">{fmtRupee(gst)}</span></div>
          <div className="bill-total-row grand"><span>Grand Total</span><span className="num">{fmtRupee(grand)}</span></div>

        <button className="btn btn-ghost" onClick={onClose}>Close</button>
        <button className="btn btn-secondary" onClick={()=>window.print()}>🖨 Print</button>
