<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to CoreIMS - Login</title>
    <!-- Modern Typography: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0c10;
            --form-bg: #11141c;
            --primary: #6366f1;
            --primary-glow: #818cf8;
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #1e2433;
            --border-color: #2e364f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .split-layout {
            display: flex;
            width: 100vw;
            height: 100%;
        }

        /* =============== LEFT SIDE: FORM =============== */
        .form-section {
            width: 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            background: linear-gradient(145deg, var(--form-bg), #06070a);
            position: relative;
            z-index: 10;
        }

        /* Glowing Orbs for ambient light */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: -1;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.2);
            top: -100px;
            left: -100px;
            animation: float 8s infinite alternate ease-in-out;
        }
        .orb-2 {
            width: 250px;
            height: 250px;
            background: rgba(236, 72, 153, 0.15);
            bottom: -50px;
            right: -50px;
            animation: float 10s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 40px); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
            font-size: 24px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .welcome-text {
            margin-bottom: 40px;
        }

        .welcome-text h1 {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-text p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.5;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(30, 36, 51, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .input-wrapper input::placeholder {
            color: #64748b;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-glow);
            background: rgba(30, 36, 51, 0.8);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .options-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .checkbox-wrapper input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--border-color);
            border-radius: 4px;
            background: var(--input-bg);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-wrapper input[type="checkbox"]:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-wrapper input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }

        .forgot-link {
            color: var(--primary-glow);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--secondary);
        }

        .btn-submit {
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
            margin-top: 10px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -5px rgba(99, 102, 241, 0.6);
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* =============== RIGHT SIDE: IMAGE =============== */
        .image-section {
            width: 55%;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            border-radius: 40px 0 0 40px; /* Optional curve */
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .image-section .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Transition if we load slowly */
            transition: transform 10s ease;
        }

        .image-section:hover .bg-image {
            transform: scale(1.05);
        }

        .image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(10, 12, 16, 0.2), transparent);
            pointer-events: none;
        }

        /* Glassmorphism Quote Card over Image */
        .quote-card {
            position: absolute;
            bottom: 60px;
            left: 60px;
            right: 60px;
            padding: 30px;
            background: rgba(17, 20, 28, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
        }
        
        .quote-text {
            font-size: 20px;
            font-weight: 300;
            line-height: 1.5;
            margin-bottom: 20px;
            font-style: italic;
        }

        .quote-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .quote-author .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fb7185, #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .quote-author-info h4 {
            font-size: 14px;
            font-weight: 600;
        }
        .quote-author-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Responsiveness */
        @media (max-width: 1024px) {
            .form-section {
                width: 50%;
            }
            .image-section {
                width: 50%;
            }
        }
        @media (max-width: 768px) {
            .split-layout {
                flex-direction: column;
            }
            .form-section {
                width: 100%;
                padding: 40px;
            }
            .image-section {
                display: none; /* Hide image on mobile for clear form focus */
            }
        }

    </style>
</head>
<body>

    <div class="split-layout">
        <!-- FORM SECTION -->
        <main class="form-section">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>

            <div class="logo">
                <div class="logo-icon">C</div>
                CoreIMS
            </div>

            <div class="welcome-text">
                <h1>Welcome Back</h1>
                <p>Enter your credentials to access your inventory workspace</p>
            </div>

            <form class="login-form" action="/login" method="POST">
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="name@company.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="options-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember" id="remember">
                        Remember me for 30 days
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">
                    Sign In
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </main>

        <!-- IMAGE SECTION -->
        <aside class="image-section">
            <div class="image-overlay"></div>
            <!-- Beautiful abstract colorful 3D background generated previously -->
            <img class="bg-image" src="{{ url_for('static', filename='login_bg.png') }}" alt="Login Aesthetic Background">
            
            <div class="quote-card">
                <p class="quote-text">"Managing millions of units worldwide with absolute precision, speed, and real-time reliability. CoreIMS has transformed our supply chain."</p>
                <div class="quote-author">
                    <div class="avatar">SJ</div>
                    <div class="quote-author-info">
                        <h4>Sarah Jenkins</h4>
                        <span>VP of Operations & Logistics</span>
                    </div>
                </div>
            </div>
        </aside>

    </div>

</body>
</html>
